spring:
  application:
    name: burguer-restaurant
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:burguer_restaurant}
    username: ${DB_USERNAME:burguer_user}
    password: ${DB_PASSWORD:burguer_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

app:
  name: Burguer Restaurant
  description: Backend inicial para operacao em tablets de restaurante
