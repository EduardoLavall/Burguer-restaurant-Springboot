spring:
  application:
    name: burguer-restaurant
  datasource:
    url: jdbc:sqlite:./data/restaurant-app.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      connection-init-sql: PRAGMA foreign_keys=ON
  flyway:
    enabled: true
    locations: classpath:db/migration-sqlite
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

app:
  name: Burguer Restaurant
  description: Backend inicial para operacao em tablets de restaurante
